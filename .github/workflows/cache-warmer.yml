name: Cache Warmer

# Run every 5 minutes
on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch:       # allows manual run

jobs:
  warm_cache:
    runs-on: ubuntu-latest

    steps:
      - name: Hit Cache URL with Logs
        run: |
          # Get current UTC time
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Request the cache URL
          RESPONSE=$(curl -s "https://avixy.in/cache-warm.php?key=123")
          
          # Check if response starts with "ok"
          if [[ "$RESPONSE" == ok* ]]; then
            echo "[$NOW] ✅ SUCCESS - $RESPONSE"
          else
            echo "[$NOW] ❌ FAILED - ${RESPONSE:0:100}"
          fi
