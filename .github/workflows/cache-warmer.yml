name: Cache Warmer Puppeteer Stealth

# Run every 3 minutes and also manually
on:
  schedule:
    - cron: '*/3 * * * *'  # every 3 minutes (UTC)
  workflow_dispatch:       # manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # run all JS actions on Node 24

jobs:
  warm_cache:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - uses: actions/checkout@v3

      # Setup Node.js 24
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 24

      # Cache node_modules to speed up runs
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: cache-warmer-node-modules-{{ hashFiles('package-lock.json') }}
          restore-keys: |
            cache-warmer-node-modules-

      # Install dependencies (puppeteer + stealth plugin)
      - name: Install Puppeteer & Stealth
        run: |
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      # Run Puppeteer cache warmer
      - name: Run Puppeteer Cache Warmer
        run: |
          node -e "
          const puppeteer = require('puppeteer-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          puppeteer.use(StealthPlugin());

          (async () => {
            const browser = await puppeteer.launch({ 
              headless: true,
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-blink-features=AutomationControlled'
              ] 
            });

            const page = await browser.newPage();
            const now = new Date().toISOString();
            try {
              await page.goto('https://avixy.in/cache-warm.php?key=123', { waitUntil: 'networkidle2', timeout: 30000 });
              const body = await page.evaluate(() => document.body.innerText);

              if (body.startsWith('ok')) {
                console.log(\`[\${now}] ✅ SUCCESS - \${body}\`);
              } else {
                console.log(\`[\${now}] ❌ FAILED - \${body.substring(0,100)}\`);
              }
            } catch(e) {
              console.log(\`[\${now}] ❌ ERROR - \${e.message}\`);
            } finally {
              await browser.close();
            }
          })();"
