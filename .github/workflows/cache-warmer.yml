name: Cache Warmer (Full Browser)

on:
  schedule:
    - cron: '*/5 * * * *' # every 5 minutes
  workflow_dispatch:       # manual trigger

jobs:
  warm_cache:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Run Puppeteer Cache Warmer
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ 
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox'] 
            });
            const page = await browser.newPage();
            const now = new Date().toISOString();
            try {
              await page.goto('https://avixy.in/cache-warm.php?key=123', { waitUntil: 'networkidle2', timeout: 30000 });
              const body = await page.evaluate(() => document.body.innerText);
              if (body.startsWith('ok')) {
                console.log(\`[\${now}] ✅ SUCCESS - \${body}\`);
              } else {
                console.log(\`[\${now}] ❌ FAILED - \${body.substring(0,100)}\`);
              }
            } catch(e) {
              console.log(\`[\${now}] ❌ ERROR - \${e.message}\`);
            } finally {
              await browser.close();
            }
          })();"
