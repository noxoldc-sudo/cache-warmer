name: Cache Warmer Puppeteer Stealth

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (GitHub minimum)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  warm_cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 24
      
      - name: Install Puppeteer system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libdrm2 libgbm1 libxkbcommon0 libasound2
      
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: cache-warmer-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: cache-warmer-node-modules-
      
      - name: Install Puppeteer & Stealth
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth
      
      - name: Run Puppeteer Cache Warmer
        run: |
          node -e "
          const puppeteer = require('puppeteer-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          puppeteer.use(StealthPlugin());

          (async () => {
            const browser = await puppeteer.launch({ 
              headless: true,
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-blink-features=AutomationControlled'
              ] 
            });

            const page = await browser.newPage();
            const now = new Date().toISOString();
            try {
              await page.goto('https://avixy.in/cache-warm.php?key=123', { waitUntil: 'networkidle2', timeout: 30000 });
              const body = await page.evaluate(() => document.body.innerText);

              if (body.startsWith('ok')) {
                console.log(\`[\${now}] ✅ SUCCESS - \${body}\`);
              } else {
                console.log(\`[\${now}] ❌ FAILED - \${body.substring(0,100)}\`);
              }
            } catch(e) {
              console.log(\`[\${now}] ❌ ERROR - \${e.message}\`);
              process.exit(1);   // Make the step fail so you see it
            } finally {
              await browser.close();
            }
          })();"
